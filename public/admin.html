<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>收纳记忆</title>
    <link rel="stylesheet" href="/admin.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <h1>收纳记忆</h1>
        <a id="exportLink" href="/api/export.csv">导出 CSV</a>
      </header>

      <section class="panel">
        <label for="token">访问令牌</label>
        <input id="token" type="password" placeholder="SHORTCUT_TOKEN">
      </section>

      <section class="panel">
        <label for="search">搜索</label>
        <input id="search" type="search" placeholder="螺丝、充电线、修椅子用的东西">
      </section>

      <form id="addForm" class="panel add-form">
        <label for="itemName">添加记忆</label>
        <input id="itemName" name="displayName" required placeholder="物品名称，比如 M3 螺丝">
        <input id="itemLocation" name="location" required placeholder="位置，比如 卧室衣柜右边第三个抽屉">
        <input id="itemTags" name="tags" placeholder="标签，用逗号分隔，比如 螺丝,五金,M3">
        <textarea id="itemDescription" name="description" rows="2" placeholder="备注，可不填"></textarea>
        <button type="submit">保存记忆</button>
        <p id="addStatus" class="meta"></p>
      </form>

      <section class="panel location-panel">
        <div class="section-title">
          <h2>常用位置</h2>
          <span class="meta">先建房间、柜子、抽屉，AI 录入时会优先匹配。</span>
        </div>
        <form id="locationForm" class="location-form">
          <input id="locationName" name="name" required placeholder="位置名称，比如 客厅、电视柜、左侧抽屉">
          <select id="locationParent" name="parentId">
            <option value="">顶层位置</option>
          </select>
          <input id="locationAliases" name="aliases" placeholder="别名，用逗号分隔，比如 左抽,客厅抽屉">
          <button type="submit">保存位置</button>
        </form>
        <p id="locationStatus" class="meta"></p>
        <div id="locations" class="locations"></div>
      </section>

      <section id="items" class="items"></section>
    </main>
    <script src="/admin.js"></script>
  </body>
</html>
